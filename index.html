<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dear Pí Đông 🎂</title>

<style>
:root{
  --bg1:#ffb6c1;
  --bg2:#ff99cc;
  --primary:#ffd166;
  --text:#4a0d2c;
  --white:#ffffff;
  --shadow:0 10px 30px rgba(0,0,0,.15);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Segoe UI", system-ui, sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  overflow:hidden;
}

/* CONTAINER */
.container{
  text-align:center;
  max-width:500px;
  padding:20px;
}

/* TITLE */
h1{
  font-size:32px;
  margin-bottom:20px;
}

/* CAKE */
.cake{
  position:relative;
  width:220px;
  height:140px;
  margin:0 auto 20px;
  cursor:pointer;
}

.layer{
  width:100%;
  height:60px;
  background:#f7c6c7;
  border-radius:14px;
  position:absolute;
  bottom:0;
  box-shadow:var(--shadow);
}

.cream{
  position:absolute;
  top:-18px;
  width:100%;
  height:30px;
  background:#fff3e6;
  border-radius:14px 14px 0 0;
}

/* CANDLE */
.candle{
  position:absolute;
  width:12px;
  height:50px;
  background:#ffc3c3;
  left:50%;
  transform:translateX(-50%);
  bottom:60px;
  border-radius:4px;
}

.flame{
  position:absolute;
  width:14px;
  height:22px;
  background:radial-gradient(circle,#fff,#ffa600);
  border-radius:50%;
  top:-20px;
  left:50%;
  transform:translateX(-50%);
  animation:flicker .12s infinite alternate;
}

@keyframes flicker{
  from{transform:translateX(-50%) scale(1)}
  to{transform:translateX(-50%) scale(.9)}
}

/* BUTTON */
button{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:var(--primary);
  font-weight:600;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:.2s;
}
button:hover{transform:translateY(-2px)}

/* CARD */
.card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(.9);
  background:var(--white);
  padding:24px;
  border-radius:16px;
  max-width:320px;
  text-align:center;
  line-height:1.6;
  box-shadow:var(--shadow);
  opacity:0;
  transition:.4s;
}

.card.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* FIREWORK */
.firework{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:explode 1.4s ease-out forwards;
}

@keyframes explode{
  0%{transform:scale(.3);opacity:1}
  100%{transform:translate(var(--dx),var(--dy));opacity:0}
}
</style>
</head>

<body>

<div class="container">
  <h1>🎉 Dear <b>Pí Đông</b></h1>

  <div class="cake" onclick="blow()">
    <div class="layer">
      <div class="cream"></div>
    </div>
    <div class="candle">
      <div class="flame" id="flame"></div>
    </div>
  </div>

  <button onclick="blow()">Thổi nến</button>
</div>

<div class="card" id="card">
  🎂 Dear <b>Pí Đông</b>,<br><br>
  Chúc chị sang tuổi mới luôn may mắn và công việc thuận lợi.<br><br>
  Em không biết bày tỏ nhiều, mong chị thông cảm. 💖
</div>

<script>
let blown=false;

function blow(){
  if(blown) return;
  blown=true;

  document.getElementById("flame").style.display="none";
  document.getElementById("card").classList.add("show");

  for(let i=0;i<50;i++){
    let f=document.createElement("div");
    f.className="firework";

    let angle=Math.random()*2*Math.PI;
    let dist=140+Math.random()*60;

    f.style.left="50%";
    f.style.top="40%";
    f.style.background=`hsl(${Math.random()*360},100%,60%)`;

    f.style.setProperty("--dx",Math.cos(angle)*dist+"px");
    f.style.setProperty("--dy",Math.sin(angle)*dist+"px");

    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1400);
  }
}
</script>

</body>
</html>
